<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Faces demo (jsPsych 8)</title>

    <!-- jsPsych core (v8.2.2) -->
    <script src="https://unpkg.com/jspsych@8.2.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" />

    <!-- Plugins (v2.x) -->
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.0.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-likert@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@2.1.0"></script>

    <style>
      body { max-width: 900px; margin: 2rem auto; }
      .face { display:block; margin: 0 auto 1rem; max-width: 320px; height:auto; border-radius: 8px; }
      .note { font-size: .9rem; color:#666; margin-top:.25rem; text-align:center; }
    </style>
  </head>
<body>
<script>
  // Wait for DOM and all scripts to load
  window.addEventListener('load', function() {

    // 1) Point to your images here (relative to /images)
    const image_files = [
      "images_test/portrait_1.png",
      "images_test/portrait_2.png",
      "images_test/portrait_3.png",
      "images_test/portrait_4.png",
      "images_test/portrait_5.png"
    ];

    // Optional: if you want to use only a random subset, set N > 0.
    const N_RANDOM = 3; // 0 = use all images; otherwise e.g., 10

    // 2) Init jsPsych
    const jsPsych = initJsPsych({
      on_finish: () => jsPsych.data.get().localSave('csv', 'faces_demo_data.csv'),
      override_safe_mode: true // only if you're running via file://
    });

    // 3) Preload images
    const preload = {
      type: jsPsychPreload,
      images: image_files,
      message: 'Loading images…'
    };

    // 4) Simple participant ID (optional but useful)
    const pid = Math.random().toString(36).slice(2,8);
    jsPsych.data.addProperties({ participant_id: pid, started_at: new Date().toISOString() });

    // 5) Welcome / instructions
    const welcome = {
      type: jsPsychInstructions,
      pages: [
        `<h2>Welcome!</h2>
         <p>You'll see a series of faces. For each one, answer a few quick questions.</p>
         <p>This is a local demo. At the end, a CSV will download to your computer.</p>`,
        `<p>Press <strong>Next</strong> to begin.</p>`
      ],
      show_clickable_nav: true,
      allow_keys: false,
    };

    // 6) Build randomized list of images (optionally sample a subset)
    let shuffled = jsPsych.randomization.shuffle(image_files);
    if (N_RANDOM > 0 && N_RANDOM < shuffled.length) {
      shuffled = shuffled.slice(0, N_RANDOM);
    }

    // 7) For each image, ask a few questions.
    // We'll use survey pages with the image in the preamble.
    const trials = shuffled.flatMap((imgPath, idx) => {
      const preambleHTML = `
        <img class="face" src="${imgPath}" alt="face ${idx+1}" />
        <div class="note">Image ${idx+1} of ${shuffled.length}</div>
      `;

      const likert = {
        type: jsPsychSurveyLikert,
        preamble: preambleHTML,
        questions: [
          {
            prompt: "How trustworthy does this person look?",
            labels: ["1 (Not at all)", "2","3","4","5","6","7 (Very)"],
            required: true,
            name: "trustworthy"
          },
          {
            prompt: "How approachable does this person look?",
            labels: ["1 (Not at all)", "2","3","4","5","6","7 (Very)"],
            required: true,
            name: "approachable"
          }
        ],
        randomize_question_order: false,
        on_finish: (data) => { data.image = imgPath; data.page = "likert"; }
      };

      const multi = {
        type: jsPsychSurveyMultiChoice,
        preamble: preambleHTML,
        questions: [
          {
            prompt: "Do you think you have seen this person before?",
            options: ["Yes", "No", "Not sure"],
            required: true,
            name: "familiarity"
          }
        ],
        on_finish: (data) => { data.image = imgPath; data.page = "multi"; }
      };

      const age = {
        type: jsPsychSurveyText,
        preamble: preambleHTML,
        questions: [
          {
            prompt: "Guess their age (number):",
            placeholder: "e.g., 32",
            required: true,
            name: "age_guess"
          }
        ],
        on_finish: (data) => { data.image = imgPath; data.page = "age"; }
      };

      return [likert, multi, age];
    });

    // 8) Goodbye screen (triggers CSV download via on_finish above)
    const goodbye = {
      type: jsPsychInstructions,
      pages: [
        `<h2>Done!</h2>
         <p>Thanks! Your data is being saved as <code>faces_demo_data.csv</code>.</p>
         <p>If the download didn't auto-start, press the button below to download manually.</p>`
      ],
      show_clickable_nav: true,
      allow_keys: false,
      button_label_next: "Download data",
      on_finish: () => {
        // manual backup download
        jsPsych.data.get().localSave('csv', 'faces_demo_data.csv');
      }
    };

    // 9) Run the timeline
    jsPsych.run([preload, welcome, ...trials, goodbye]);
    
  }); // end window.load
</script>
</body>
</html>
