<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Faces demo (jsPsych 8)</title>

    <!-- jsPsych core (v8.2.2) -->
    <script src="https://unpkg.com/jspsych@8.2.2"></script>
    <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" />

    <!-- Plugins (keep versions consistent) -->
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-likert@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@2.1.0"></script>

    <style>
      body { max-width: 900px; margin: 2rem auto; }
      .face { display:block; margin: 0 auto 1rem; max-width: 320px; height:auto; border-radius: 8px; }
      .note { font-size: .9rem; color:#666; margin-top:.25rem; text-align:center; }
    </style>
  </head>
  <body>
    <script>
      window.addEventListener('load', function () {
        // 1) Images (ensure these paths exist relative to this HTML file)
        const image_files = [
          "images_test/portrait_1.png",
          "images_test/portrait_2.png",
          "images_test/portrait_3.png",
          "images_test/portrait_4.png",
          "images_test/portrait_5.png"
        ];
        const N_RANDOM = 3; // 0 => use all

        // 2) Init
        const jsPsych = initJsPsych({
          on_finish: () => {
            // Some browsers block auto-downloads not triggered by a click.
            // We save again on the final Instructions screen (user-initiated).
            try { jsPsych.data.get().localSave('csv', 'faces_demo_data.csv'); } catch(e) { /* no-op */ }
          },
          'override_safe_mode': true
        });

        // Participant props
        const pid = Math.random().toString(36).slice(2, 8);
        jsPsych.data.addProperties({ participant_id: pid, started_at: new Date().toISOString() });

        // 3) Preload
        const preload = {
          type: jsPsychPreload,
          images: image_files,
          message: 'Loading images…',
          continue_after_error: true // don’t stall if one image is missing
        };

        // 4) Welcome
        const welcome = {
          type: jsPsychInstructions,
          pages: [
            `<h2>Welcome!</h2>
             <p>You’ll answer a few questions, then rate some faces.</p>
             <p>A CSV will download at the end.</p>`,
            `<p>Press <strong>Next</strong> to begin.</p>`
          ],
          show_clickable_nav: true
        };

        // 5) SDO items (one per page)
        const sdo_items = [
          { text: "Some groups of people are simply inferior to other groups.", name: "SDO1" },
          { text: "It is okay if some groups have more of a chance in life than others.", name: "SDO2" },
          { text: "We should do what we can to equalize conditions for different groups.", name: "SDO3" }
        ];
        const sdo_trials = sdo_items.map(item => ({
          type: jsPsychSurveyLikert,
          preamble: `<h3>Social Attitudes</h3>
                     <p>Please indicate how much you agree or disagree.</p>`,
          questions: [{
            prompt: item.text,
            labels: ["1 (Strongly disagree)", "2","3","4","5","6","7 (Strongly agree)"],
            required: true,
            name: item.name
          }],
          data: { section: "SDO", item: item.name }
        }));

        // 6) Randomize faces (optional subset)
        let shuffled = jsPsych.randomization.shuffle(image_files);
        if (N_RANDOM > 0 && N_RANDOM <= shuffled.length) shuffled = shuffled.slice(0, N_RANDOM);

        // 7) Face trials
        const trials = shuffled.flatMap((imgPath, idx) => {
          const preambleHTML = `
            <img class="face" src="${imgPath}" alt="face ${idx+1}" />
            <div class="note">Image ${idx+1} of ${shuffled.length}</div>
          `;
          const likert = {
            type: jsPsychSurveyLikert,
            preamble: preambleHTML,
            questions: [
              { prompt: "How trustworthy does this person look?", labels: ["1","2","3","4","5","6","7"], required: true, name: "trustworthy" },
              { prompt: "How approachable does this person look?", labels: ["1","2","3","4","5","6","7"], required: true, name: "approachable" }
            ],
            data: { image: imgPath, page: "likert" }
          };
          const multi = {
            type: jsPsychSurveyMultiChoice,
            preamble: preambleHTML,
            questions: [{ prompt: "Have you seen this person before?", options: ["Yes","No","Not sure"], required: true, name: "familiarity" }],
            data: { image: imgPath, page: "multi" }
          };
          const age = {
            type: jsPsychSurveyText,
            preamble: preambleHTML,
            questions: [{ prompt: "Guess their age (number):", placeholder: "e.g., 32", required: true, name: "age_guess" }],
            on_finish: d => {
              // Optional: coerce to number for convenience
              if (d.response && typeof d.response.age_guess === 'string') {
                const n = Number(d.response.age_guess.trim());
                d.age_guess_num = Number.isFinite(n) ? n : null;
              }
            },
            data: { image: imgPath, page: "age" }
          };
          return [likert, multi, age];
        });

        // 8) Goodbye (use user click to ensure download is allowed)
        const goodbye = {
          type: jsPsychInstructions,
          pages: [
            `<h2>Done!</h2>
             <p>Your data will download as <code>faces_demo_data.csv</code>.</p>
             <p>If it didn’t auto-start, click Next.</p>`
          ],
          show_clickable_nav: true,
          button_label_next: "Download data",
          on_finish: () => {
            try { jsPsych.data.get().localSave('csv', 'faces_demo_data.csv'); } catch(e) {
              console.warn('Download may be blocked by the browser:', e);
            }
          }
        };

        // 9) Run
        jsPsych.run([preload, welcome, ...sdo_trials, ...trials, goodbye]);
      });
    </script>
  </body>
</html>
